name: faarfannaa_obbolootaa
description: "Faarfanna Obbolootaa - Gospel Song Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.12.4

  # Audio
  just_audio: ^0.10.5
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # State Management
  provider: ^6.1.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  lottie: ^3.1.2

  # Utils
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  connectivity_plus: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  http: ^1.2.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
